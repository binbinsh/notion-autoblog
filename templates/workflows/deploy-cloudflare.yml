# This is an example workflow showing how to deploy to Cloudflare Pages.
# Adjust the `on:` section if you want to change the default push/schedule behavior.

name: Deploy Example (Cloudflare Pages)

concurrency:
  group: site-${{ github.ref_name }}-media-v2
  cancel-in-progress: false

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      SITE_DIR: .
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Create virtual environment
        run: uv venv --python 3.10

      - name: Install notion-autoblog
        run: uv pip install notion-autoblog/

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      - name: Restore site cache (media and state)
        uses: actions/cache/restore@v4
        id: site-cache
        with:
          path: |
            ${{ env.SITE_DIR }}/.notion_cache.json
            ${{ env.SITE_DIR }}/static/images
            ${{ env.SITE_DIR }}/static/videos
            ${{ env.SITE_DIR }}/static/audios
            ${{ env.SITE_DIR }}/static/files
          # Cache contents evolve after each sync, so restore the latest prefix match
          # and save the current run under a fresh key.
          key: site-${{ github.ref_name }}-media-v2-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            site-${{ github.ref_name }}-media-v2-

      - name: Log cache status
        run: |
          echo "cache-primary-key=${{ steps.site-cache.outputs.cache-primary-key }}"
          echo "cache-hit=${{ steps.site-cache.outputs.cache-hit }}"

      - name: Change cache ownership
        run: |
          if [ -f "$SITE_DIR/.notion_cache.json" ]; then sudo chown $(whoami) "$SITE_DIR/.notion_cache.json"; fi
          if [ -d "$SITE_DIR/static" ]; then sudo chown -R $(whoami) "$SITE_DIR/static"; fi

      - name: Sync posts from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: uv run notion-autoblog --site-dir "$SITE_DIR"

      - name: Build Hugo site
        run: hugo --source "$SITE_DIR" --minify --cleanDestinationDir

      - name: Save site cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ env.SITE_DIR }}/.notion_cache.json
            ${{ env.SITE_DIR }}/static/images
            ${{ env.SITE_DIR }}/static/videos
            ${{ env.SITE_DIR }}/static/audios
            ${{ env.SITE_DIR }}/static/files
          key: site-${{ github.ref_name }}-media-v2-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy "${{ env.SITE_DIR }}/public" --project-name ${{ vars.CLOUDFLARE_PAGES_PROJECT }} --branch main

      - name: Purge Cloudflare cache
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          curl -fsS -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
