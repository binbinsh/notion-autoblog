baseURL = 'https://train.sh/'
languageCode = 'en-US'
title = 'Welcome to train.sh'
theme = 'hugo-trainsh'

# Build settings
buildFuture = true
buildDrafts = false
timeZone = 'Asia/Shanghai'

# Disable taxonomy pages (no /tags or /categories).
disableKinds = ["taxonomy"]

# URL normalization
disablePathToLower = false
removePathAccents = true
preserveTaxonomyNames = false

# Multilingual (Hugo links translations by filename suffix: post.md + post.en.md)
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
hasCJKLanguage = true

[languages]
  [languages.zh]
    languageCode = "zh-CN"
    languageName = "中文"
    weight = 2

    [[languages.zh.menu.main]]
      name = "主页"
      pageRef = "/"
      weight = 1

    [[languages.zh.menu.main]]
      name = "博客"
      pageRef = "/blog"
      weight = 10

  [languages.en]
    languageCode = "en-US"
    languageName = "English"
    weight = 1

    [[languages.en.menu.main]]
      name = "Home"
      pageRef = "/"
      weight = 1

    [[languages.en.menu.main]]
      name = "Blog"
      pageRef = "/blog"
      weight = 10

[params]
  author = "Binbin Shen"
  # Notion slugs currently generate content under /blog/... in CI, so only "blog" is treated as the primary section.
  mainSections = ["blog"]
  description = "Doppio is a double-shot helper for everyday coding workflows."

[params.translate]
  sourceLanguage = "zh"

[params.upvote]
  enabled = true
  endpoint = "/api/upvote"
  infoEndpoint = "/api/upvote-info"

[params.social]
  email = "hello@train.sh"

[params.home]
  intro = """Building Doppio☕️☕️ — a double-shot helper for everyday coding workflows."""

[params.home.recent]
  limit = 5

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.parser]
      [markup.goldmark.parser.attribute]
        block = true
    [markup.goldmark.renderer]
      unsafe = true

  [markup.highlight]
    # Keep settings aligned with the theme's `render-codeblock.html` hook.
    lineNos = false
    lineNumbersInTable = false
    anchorLineNos = false
    codeFences = true
    guessSyntax = true
    lineNoStart = 1
    noClasses = false
