baseURL = 'https://train.sh/'
languageCode = 'en-us'
title = 'Welcome to train.sh'
theme = 'hugo-trainsh'

# Build settings
buildFuture = true
buildDrafts = false
timeZone = 'Asia/Shanghai'

# URL normalization
disablePathToLower = false
removePathAccents = true
preserveTaxonomyNames = false

[pagination]
  pagerSize = 10

[params]
  description = "a personal blog"
  author = "Binbin Shen"
  mainSections = ["posts"]

[params.social]
  github = "https://github.com/binbinsh"
  email = "hello@train.sh"

[params.home]
  intro = """👋 Welcome! This is a personal blog where I share hands-on notes on ML experiments, developer productivity, and open-source, self-hosted workflows. Expect practical guides, automation patterns, and reflections from building, iterating, and bridging real-world experiments with developer-first, open-source problem solving."""

[params.home.tags]
  # Set to 0 or negative to show all tags
  limit = 6

[params.home.recent]
  limit = 10

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.parser]
      [markup.goldmark.parser.attribute]
        block = true
    [markup.goldmark.renderer]
      unsafe = true

  [markup.highlight]
    # Enable line numbers and render them in a table
    lineNos = true
    lineNumbersInTable = true
    anchorLineNos = false
    codeFences = true
    lineNoStart = 1
    noClasses = true
