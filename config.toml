baseURL = 'https://train.sh/'
languageCode = 'zh-CN'
title = 'train.sh Doppio'
theme = 'hugo-trainsh'

# Multilingual (Hugo links translations by filename suffix: post.md + post.en.md)
defaultContentLanguage = "zh"
defaultContentLanguageInSubdir = false
hasCJKLanguage = true

[languages]
  [languages.zh]
    languageCode = "zh-CN"
    languageName = "中文"
    weight = 1

  [languages.en]
    languageCode = "en-US"
    languageName = "English"
    weight = 2

# Build settings
buildFuture = true
buildDrafts = false
timeZone = 'Asia/Shanghai'

# URL normalization
disablePathToLower = false
removePathAccents = true
preserveTaxonomyNames = false

[params]
  author = "Binbin Shen"
  # Notion slugs currently generate content under /blog/... in CI, so only "blog" is treated as the primary section.
  mainSections = ["blog"]
  toc = false
  description = "Doppio is a double-shot helper for everyday coding workflows."

[params.upvote]
  enabled = true
  endpoint = "/api/upvote"
  infoEndpoint = "/api/upvote-info"
  cookieDomain = ""

[params.social]
  email = "hello@train.sh"

[params.home]
  intro = """Building Doppio☕️☕️ — a double-shot helper for everyday coding workflows."""

[params.home.tags]
  # Set to 0 or negative to show all tags
  limit = 6

[params.home.recent]
  limit = 10

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.parser]
      [markup.goldmark.parser.attribute]
        block = true
    [markup.goldmark.renderer]
      unsafe = true

  [markup.highlight]
    # Keep settings aligned with the theme's `render-codeblock.html` hook.
    lineNos = false
    lineNumbersInTable = false
    anchorLineNos = false
    codeFences = true
    guessSyntax = true
    lineNoStart = 1
    noClasses = false

[build]
  [build.buildStats]
    enable = true

[caches]
  [caches.assets]
    dir = ':resourceDir/_gen'
    maxAge = -1
  [caches.getcsv]
    dir = ':cacheDir/:project'
    maxAge = -1
  [caches.getjson]
    dir = ':cacheDir/:project'
    maxAge = -1
  [caches.getresource]
    dir = ':cacheDir/:project'
    maxAge = -1
  [caches.images]
    dir = ':resourceDir/_gen'
    maxAge = -1
  [caches.modules]
    dir = ':cacheDir/modules'
    maxAge = -1

[[module.mounts]]
  source = 'assets'
  target = 'assets'

[[module.mounts]]
  source = 'hugo_stats.json'
  target = 'assets/watching/hugo_stats.json'
