baseURL = 'https://train.sh/'
languageCode = 'en-us'
title = 'Welcome to train.sh'
theme = 'hugo-trainsh'

# Build settings
buildFuture = true
buildDrafts = false
timeZone = 'Asia/Shanghai'

# URL normalization
disablePathToLower = false
removePathAccents = true
preserveTaxonomyNames = false

[pagination]
  pagerSize = 10

[params]
  description = "a personal blog"
  author = "Binbin Shen"
  mainSections = ["posts"]

[params.upvote]
  enabled = true
  endpoint = "/api/upvote"
  infoEndpoint = "/api/upvote-info"
  cookieDomain = ""

[params.social]
  github = "https://github.com/binbinsh"
  email = "hello@train.sh"

[params.home]
  intro = """👋 Welcome! This is a personal blog where I document my learning journey in artificial intelligence, productivity, and record my thoughts on technology and life. Nothing groundbreaking here, just notes and reflections."""

[params.home.tags]
  # Set to 0 or negative to show all tags
  limit = 6

[params.home.recent]
  limit = 10

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.parser]
      [markup.goldmark.parser.attribute]
        block = true
    [markup.goldmark.renderer]
      unsafe = true

  [markup.highlight]
    noClasses = false
    lineNos = false
    lineNumbersInTable = false
    anchorLineNos = false
    codeFences = true
    guessSyntax = true
    style = "tokyonight-day"
    styleDark = "tokyonight-night"

[build]
  [build.buildStats]
    enable = true

[caches]
  [caches.assets]
    dir = ':resourceDir/_gen'
    maxAge = -1
  [caches.getcsv]
    dir = ':cacheDir/:project'
    maxAge = -1
  [caches.getjson]
    dir = ':cacheDir/:project'
    maxAge = -1
  [caches.getresource]
    dir = ':cacheDir/:project'
    maxAge = -1
  [caches.images]
    dir = ':resourceDir/_gen'
    maxAge = -1
  [caches.modules]
    dir = ':cacheDir/modules'
    maxAge = -1

[[module.mounts]]
  source = 'assets'
  target = 'assets'

[[module.mounts]]
  source = 'hugo_stats.json'
  target = 'assets/watching/hugo_stats.json'
