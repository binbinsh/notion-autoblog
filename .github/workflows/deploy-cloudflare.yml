# Deploy train.sh (Notion -> Hugo -> Cloudflare Worker)
#
# Notes:
# - This workflow syncs content from Notion via notion-hugo-deploy, builds the Hugo site,
#   then deploys a Cloudflare Worker that serves both static assets and the /api/* endpoints.
# - Required GitHub Secrets:
#   - NOTION_TOKEN
#   - NOTION_DATABASE_ID
#   - CLOUDFLARE_API_TOKEN
#   - CLOUDFLARE_ACCOUNT_ID
#   - CLOUDFLARE_ZONE_ID
#   - UPVOTE_KV_NAMESPACE
# - Optional GitHub Secrets:
#   - OPENROUTER_API_KEY (enables auto-translation)

name: Deploy (Cloudflare Worker)

concurrency:
  group: site-${{ github.ref_name }}-deploy
  cancel-in-progress: false

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Create virtual environment
        run: uv venv --python 3.11

      - name: Install notion-hugo-deploy
        run: uv pip install notion-hugo-deploy/

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          # Pin a known-good Hugo version (theme requires >= 0.148.0).
          hugo-version: "0.153.2"
          extended: true

      - name: Restore site cache (media and state)
        uses: actions/cache/restore@v4
        id: site-cache
        with:
          path: |
            .notion_cache.json
            static/images
            static/videos
            static/audios
          # Cache is mutable (Notion state changes over time), so use a per-run key
          # and restore the latest match by prefix.
          key: site-${{ github.ref_name }}-media-${{ github.run_id }}
          restore-keys: |
            site-${{ github.ref_name }}-media-

      - name: Fix cached file ownership
        if: steps.site-cache.outputs.cache-hit == 'true'
        run: |
          if [ -f .notion_cache.json ]; then sudo chown "$(whoami)" .notion_cache.json; fi
          if [ -d static ]; then sudo chown -R "$(whoami)" static; fi

      - name: Sync posts from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: uv run notion-hugo-deploy/scripts/notion_sync.py

      - name: Build Hugo site
        run: hugo --minify

      - name: Save site cache (media and state)
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            .notion_cache.json
            static/images
            static/videos
            static/audios
          key: site-${{ github.ref_name }}-media-${{ github.run_id }}

      - name: Deploy Cloudflare Worker (site + API)
        uses: cloudflare/wrangler-action@v3
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          UPVOTE_KV_NAMESPACE: ${{ secrets.UPVOTE_KV_NAMESPACE }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config cloudflare/wrangler.toml
