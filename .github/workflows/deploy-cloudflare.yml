# Deploy gridpla.net from the gridplanet example
#
# Notes:
# - This workflow installs notion-autoblog from the repository root, syncs the example site,
#   builds it, then deploys a Cloudflare Worker that serves both static assets and the /api/* endpoints.
# - Required GitHub Secrets:
#   - NOTION_TOKEN
#   - NOTION_DATABASE_ID
#   - CLOUDFLARE_API_TOKEN
#   - CLOUDFLARE_ACCOUNT_ID
name: Deploy gridpla.net (Cloudflare Worker)

concurrency:
  group: gridplanet-${{ github.ref_name }}-deploy
  cancel-in-progress: false

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SITE_DIR: examples/gridplanet
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Create virtual environment
        run: uv venv --python 3.11

      - name: Install notion-autoblog
        run: uv pip install .

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          # Pin a known-good Hugo version (theme requires >= 0.148.0).
          hugo-version: "0.153.2"
          extended: true

      - name: Restore site cache (media and state)
        uses: actions/cache/restore@v4
        id: site-cache
        with:
          path: |
            ${{ env.SITE_DIR }}/.notion_cache.json
            ${{ env.SITE_DIR }}/static/images
            ${{ env.SITE_DIR }}/static/videos
            ${{ env.SITE_DIR }}/static/audios
            ${{ env.SITE_DIR }}/static/files
          # Cache contents evolve after each sync, so restore the latest prefix match
          # and save the current run under a fresh key.
          key: gridplanet-${{ github.ref_name }}-media-v2-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            gridplanet-${{ github.ref_name }}-media-v2-

      - name: Log cache status
        run: |
          echo "cache-primary-key=${{ steps.site-cache.outputs.cache-primary-key }}"
          echo "cache-matched-key=${{ steps.site-cache.outputs.cache-matched-key }}"
          echo "cache-hit=${{ steps.site-cache.outputs.cache-hit }}"

      - name: Fix cached file ownership
        run: |
          if [ -f "$SITE_DIR/.notion_cache.json" ]; then sudo chown "$(whoami)" "$SITE_DIR/.notion_cache.json"; fi
          if [ -d "$SITE_DIR/static" ]; then sudo chown -R "$(whoami)" "$SITE_DIR/static"; fi

      - name: Sync posts from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: uv run notion-autoblog --site-dir "$SITE_DIR"

      - name: Build Hugo site
        run: hugo --source "$SITE_DIR" --minify --cleanDestinationDir

      - name: Save site cache (media and state)
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ env.SITE_DIR }}/.notion_cache.json
            ${{ env.SITE_DIR }}/static/images
            ${{ env.SITE_DIR }}/static/videos
            ${{ env.SITE_DIR }}/static/audios
            ${{ env.SITE_DIR }}/static/files
          key: gridplanet-${{ github.ref_name }}-media-v2-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Resolve KV namespace id (UPVOTES)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          KV_NAMESPACE_TITLE: notion-autoblog-UPVOTES
        run: |
          set -euo pipefail

          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "Missing CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID." >&2
            exit 1
          fi

          if ! command -v jq >/dev/null 2>&1; then
            echo "jq is required but not found on runner." >&2
            exit 1
          fi

          api="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces"
          auth=(-H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" -H "Content-Type: application/json")
          title="${KV_NAMESPACE_TITLE:-notion-autoblog-UPVOTES}"

          existing="$(curl -sS "${auth[@]}" "$api?per_page=1000" | jq -r --arg title "$title" '.result[] | select(.title == $title) | .id' | head -n1 || true)"

          if [ -z "$existing" ]; then
            create_resp="$(curl -sS -X POST "${auth[@]}" "$api" --data "{\"title\":\"${title}\"}")"
            success="$(echo "$create_resp" | jq -r '.success // false')"
            if [ "$success" = "true" ]; then
              existing="$(echo "$create_resp" | jq -r '.result.id // empty')"
            else
              existing="$(curl -sS "${auth[@]}" "$api?per_page=1000" | jq -r --arg title "$title" '.result[] | select(.title == $title) | .id' | head -n1 || true)"
            fi
          fi

          if [ -z "$existing" ]; then
            echo "Failed to resolve KV namespace id for ${title}." >&2
            exit 1
          fi

          echo "UPVOTE_KV_NAMESPACE=$existing" >> "$GITHUB_ENV"

      - name: Generate Wrangler config
        working-directory: examples/gridplanet/cloudflare
        env:
          UPVOTE_KV_NAMESPACE: ${{ env.UPVOTE_KV_NAMESPACE }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          
          kv_id = (os.environ.get("UPVOTE_KV_NAMESPACE") or "").strip()
          
          if not kv_id:
            raise SystemExit("UPVOTE_KV_NAMESPACE is empty")
          
          src = Path("wrangler.toml").read_text(encoding="utf-8")
          out = src.replace("${UPVOTE_KV_NAMESPACE}", kv_id)
          Path("wrangler.generated.toml").write_text(out, encoding="utf-8")
          print("Generated wrangler.generated.toml")
          PY

      - name: Deploy Cloudflare Worker (site + API)
        uses: cloudflare/wrangler-action@v3
        env:
          UPVOTE_KV_NAMESPACE: ${{ env.UPVOTE_KV_NAMESPACE }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: examples/gridplanet/cloudflare
          command: deploy --config wrangler.generated.toml
