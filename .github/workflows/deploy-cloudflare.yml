name: Deploy train.sh

concurrency:
  group: site-${{ github.ref_name }}-media-v1
  cancel-in-progress: false

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      HUGO_VERSION: "0.148.0"
      KV_NAMESPACE_TITLE: trainsh-UPVOTES
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Create virtual environment
        run: uv venv --python 3.11

      - name: Install dependencies (pyproject)
        run: uv pip install notion-hugo-deploy/

      - name: Restore site cache (media and state)
        uses: actions/cache/restore@v4
        id: site-cache
        with:
          path: |
            .notion_cache.json
            static/images
            static/videos
            static/audio
          key: site-${{ github.ref_name }}-media-v1
          restore-keys: |
            site-${{ github.ref_name }}-

      - name: Log cache status
        run: |
          echo "cache-primary-key=${{ steps.site-cache.outputs.cache-primary-key }}"
          echo "cache-hit=${{ steps.site-cache.outputs.cache-hit }}"

      - name: Change cache ownership
        if: steps.site-cache.outputs.cache-hit == 'true'
        run: |
          if [ -f .notion_cache.json ]; then sudo chown $(whoami) .notion_cache.json; fi
          if [ -d static ]; then sudo chown -R $(whoami) static; fi

      - name: Sync posts from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          uv run notion-hugo-deploy/scripts/notion_sync.py

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: themes/hugo-trainsh/package-lock.json

      - name: Install npm dependencies
        run: npm ci
        working-directory: themes/hugo-trainsh

      - name: Link node_modules to project root
        run: ln -sfn themes/hugo-trainsh/node_modules node_modules

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Build Hugo site
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: hugo --gc --minify

      - name: Save site cache
        if: always() && steps.site-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            .notion_cache.json
            static/images
            static/videos
            static/audio
          key: ${{ steps.site-cache.outputs.cache-primary-key }}

      - name: Check upvote cookie secret
        run: |
          if [ -z "${{ secrets.UPVOTE_COOKIE_SECRET }}" ]; then
            echo "UPVOTE_COOKIE_SECRET is required to deploy the upvote worker." >&2
            exit 1
          fi

      - name: Ensure KV namespace exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          KV_NAMESPACE_TITLE: ${{ env.KV_NAMESPACE_TITLE }}
        run: |
          set -euo pipefail
          api="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces"
          auth=(-H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" -H "Content-Type: application/json")
          title="${KV_NAMESPACE_TITLE:-trainsh-UPVOTES}"

          existing=$(curl -sS "${auth[@]}" "$api?per_page=1000" | jq -r --arg title "$title" '.result[] | select(.title == $title) | .id' | head -n1 || true)

          if [ -z "$existing" ]; then
            create_resp=$(curl -sS -X POST "${auth[@]}" "$api" --data "{\"title\":\"${title}\"}")
            success=$(echo "$create_resp" | jq -r '.success // false')
            if [ "$success" = "true" ]; then
              existing=$(echo "$create_resp" | jq -r '.result.id')
            else
              existing=$(curl -sS "${auth[@]}" "$api?per_page=1000" | jq -r --arg title "$title" '.result[] | select(.title == $title) | .id' | head -n1 || true)
            fi
          fi

          if [ -z "$existing" ]; then
            echo "Failed to resolve KV namespace id for ${title}" >&2
            exit 1
          fi

          echo "UPVOTE_KV_NAMESPACE=$existing" >> "$GITHUB_ENV"

      - name: Prepare Wrangler config
        env:
          UPVOTE_KV_NAMESPACE: ${{ env.UPVOTE_KV_NAMESPACE }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          if [ -z "$CLOUDFLARE_ZONE_ID" ]; then
            echo "CLOUDFLARE_ZONE_ID is required to route the worker to train.sh/api/*" >&2
            exit 1
          fi

          envsubst < cloudflare/wrangler.toml > cloudflare/wrangler.generated.toml

      - name: Install workers-py (pywrangler)
        run: uv pip install "workers-py==1.6.1"

      - name: Deploy upvote worker
        working-directory: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          UPVOTE_COOKIE_SECRET: ${{ secrets.UPVOTE_COOKIE_SECRET }}
        run: |
          set -euo pipefail
          project_args=(--project ../themes/hugo-trainsh/cloudflare)
          pkg_args=(--with "workers-py==1.6.1")

          printf "%s" "$UPVOTE_COOKIE_SECRET" | uv run "${project_args[@]}" "${pkg_args[@]}" -- pywrangler secret put UPVOTE_COOKIE_SECRET --config wrangler.generated.toml >/dev/null 2>&1 || true
          uv run "${project_args[@]}" "${pkg_args[@]}" -- pywrangler deploy --config wrangler.generated.toml
