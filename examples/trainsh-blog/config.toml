baseURL = 'https://blog.train.sh/'
languageCode = 'en-US'
title = 'TrainShell Blog'
theme = 'hugo-trainsh'

[module]
  replacements = "github.com/binbinsh/notion-autoblog/modules/translation -> ../../../modules/translation,github.com/binbinsh/notion-autoblog/modules/upvote -> ../../../modules/upvote"

  [[module.imports]]
    path = "github.com/binbinsh/notion-autoblog/modules/translation"

  [[module.imports]]
    path = "github.com/binbinsh/notion-autoblog/modules/upvote"

# Build settings
buildFuture = true
buildDrafts = false
timeZone = 'Asia/Shanghai'

# URL normalization
disablePathToLower = false
removePathAccents = true
preserveTaxonomyNames = false

# Multilingual (Hugo links translations by filename suffix: post.md + post.en.md)
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
hasCJKLanguage = true

[languages]
  [languages.zh]
    languageCode = "zh-CN"
    languageName = "简体中文"
    weight = 2

    [[languages.zh.menu.main]]
      name = "主页"
      pageRef = "/"
      weight = 1

    [[languages.zh.menu.main]]
      name = "归档"
      pageRef = "/archives"
      weight = 10

  [languages.en]
    languageCode = "en-US"
    languageName = "English"
    weight = 1

    [[languages.en.menu.main]]
      name = "Home"
      pageRef = "/"
      weight = 1

    [[languages.en.menu.main]]
      name = "Archives"
      pageRef = "/archives"
      weight = 10

[params]
  author = "Binbin Shen"
  mainSections = ["posts"]
  description = "Personal notes on software, AI, tools, and everyday workflows."
  favicon = "favicon.svg"
  faviconVersion = "20260413-trainsh"

[params.translate]
  sourceLanguage = "zh"

[params.notion]
  contentSection = "posts"
  sectionAliases = ["blog"]

[params.upvote]
  enabled = true
  endpoint = "/api/upvote"
  infoEndpoint = "/api/upvote-info"

[params.social]
  email = "shenbinbin@train.sh"

[params.home]
  intro = """Personal notes on software, AI, tools, and everyday workflows."""

[params.home.feed]
  enabled = true
  pageSize = 5

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.parser]
      [markup.goldmark.parser.attribute]
        block = true
    [markup.goldmark.renderer]
      unsafe = true

  [markup.highlight]
    # Keep settings aligned with the theme's `render-codeblock.html` hook.
    lineNos = false
    lineNumbersInTable = false
    anchorLineNos = false
    codeFences = true
    guessSyntax = true
    lineNoStart = 1
    noClasses = false
